<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>死 · LEYENDAS · 観</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial', 'Helvetica', sans-serif;
        }

        body {
            background: #1a0a1f;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 15px;
        }

        /* Fondo con kanjis */
        body::before {
            content: "死死死死死死死死死死死死死死死死死死死死死死死死死死死死死死死死死死死死死死死";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            color: rgba(180, 0, 255, 0.12);
            font-size: 5rem;
            font-family: "MS Gothic", "Osaka", monospace;
            font-weight: bold;
            line-height: 1.2;
            white-space: pre;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
            transform: rotate(-5deg) scale(1.5);
            text-shadow: 0 0 20px #ff00ff, 0 0 40px #9900ff;
            letter-spacing: 15px;
            word-break: break-all;
        }

        body::after {
            content: "死観終滅亡絶命鬼殺魔怨恐怖冥闇奈落地獄業苦無";
            position: fixed;
            bottom: 0;
            right: 0;
            color: rgba(255, 0, 255, 0.1);
            font-size: 4rem;
            font-family: "MS Gothic", "Osaka", monospace;
            transform: rotate(10deg) translate(10%, 10%);
            white-space: pre;
            z-index: 0;
            pointer-events: none;
            text-shadow: 0 0 30px #00ffff;
        }

        /* Capa de ruido */
        .noise-3d {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, 
                rgba(255,0,255,0.02) 0px, 
                rgba(0,255,255,0.02) 2px, 
                transparent 2px, 
                transparent 6px);
            pointer-events: none;
            z-index: 1;
        }

        /* Contenedor principal */
        .container {
            width: 100%;
            max-width: 1400px;
            height: 96vh;
            background: linear-gradient(145deg, #f0e0ff, #c78aff);
            border: 10px ridge #ff66ff;
            box-shadow: 
                15px 15px 0 #000000,
                20px 20px 0 #330033,
                25px 25px 20px rgba(0,0,0,0.7),
                inset -6px -6px 0 #aa55cc,
                inset 6px 6px 0 #ffe6ff;
            padding: 20px 25px;
            position: relative;
            z-index: 2;
            transform: perspective(800px) rotateX(0.5deg) rotateY(0.2deg);
            display: flex;
            flex-direction: column;
        }

        /* Título principal */
        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 4rem;
            text-transform: uppercase;
            text-align: left;
            line-height: 1;
            color: #ffff00;
            background: linear-gradient(145deg, #cc66ff, #9933ff);
            padding: 8px 25px;
            border: 8px outset #ff99ff;
            box-shadow: 
                inset -4px -4px 0 #661aff,
                inset 4px 4px 0 #ffccff,
                10px 10px 0 #000000,
                14px 14px 0 #330066,
                18px 18px 15px rgba(0,0,0,0.6);
            letter-spacing: 4px;
            text-shadow: 3px 3px 0 #cc33ff, 4px 4px 0 #00cccc;
            margin-bottom: 15px;
            cursor: pointer;
            width: fit-content;
        }

        /* Fila superior - con carrusel de merch clickeable */
        .top-bar {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            height: 160px;
        }

        .reserve-text {
            flex: 1.5;
            background: linear-gradient(145deg, #d47aff, #b347e6);
            border: 8px ridge #ffff00;
            box-shadow: 
                inset -4px -4px 0 #9933cc,
                inset 4px 4px 0 #ffddff,
                8px 8px 0 #000000,
                12px 12px 0 #330066;
            display: flex;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Arial Black', sans-serif;
            font-size: 1.8rem;
            color: #ffffff;
            text-shadow: 3px 3px 0 #cc33cc, 4px 4px 0 #00cccc;
            text-transform: uppercase;
            padding-left: 25px;
        }

        .close-box {
            flex: 1;
            background: linear-gradient(145deg, #ff66ff, #cc33cc);
            border: 8px ridge #00ffff;
            box-shadow: 
                inset -4px -4px 0 #aa33aa,
                inset 4px 4px 0 #ffccff,
                8px 8px 0 #000000,
                12px 12px 0 #330033;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            color: #ffff00;
            text-shadow: 2px 2px 0 #ff0000;
            padding-left: 15px;
        }

        .close-box .x {
            font-size: 1.2rem;
            letter-spacing: 3px;
            background: black;
            padding: 2px 12px;
            border: 3px inset #ff00ff;
            margin-bottom: 4px;
        }

        .close-box .time {
            font-size: 1.6rem;
            background: #000000;
            padding: 4px 18px;
            border: 4px inset #00ff00;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            font-weight: bold;
        }

        /* Carrusel de Merch (CLICKEABLE) */
        .merch-carousel {
            flex: 2;
            background: linear-gradient(145deg, #cc66ff, #9933cc);
            border: 8px ridge #ffaa33;
            box-shadow: 
                inset -4px -4px 0 #8822bb,
                inset 4px 4px 0 #ffddff,
                8px 8px 0 #000000,
                12px 12px 0 #330066;
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .merch-title {
            font-family: 'Arial Black', sans-serif;
            font-size: 1.2rem;
            color: #ffff00;
            text-shadow: 2px 2px 0 #ff33ff;
            margin-bottom: 5px;
            padding-left: 5px;
        }

        .merch-track-container {
            width: 100%;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        .merch-track {
            display: flex;
            gap: 15px;
            height: 100%;
            animation: scrollMerch 25s linear infinite;
            width: fit-content;
            padding: 5px 0;
        }

        .merch-track:hover {
            animation-play-state: paused;
        }

        @keyframes scrollMerch {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .merch-item {
            min-width: 140px;
            height: 100%;
            background: #2a0044;
            border: 4px solid #ff66ff;
            box-shadow: 
                inset -3px -3px 0 #660066,
                inset 3px 3px 0 #ffb3ff,
                5px 5px 0 #000000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 8px;
            transition: transform 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
        }

        .merch-item:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 5px 5px 0 #ff00ff, 8px 8px 0 #000000;
        }

        .merch-item img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            background: #ff99ff;
            border: 3px solid #ffffff;
            box-shadow: inset 0 0 0 2px #000000;
        }

        .merch-item .name {
            font-family: 'Arial Black', sans-serif;
            font-size: 0.8rem;
            color: #ffff00;
            text-align: center;
            margin: 5px 0 2px;
            text-shadow: 1px 1px 0 #ff00ff;
        }

        .merch-item .price {
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            color: #00ff00;
            background: #000000;
            padding: 2px 8px;
            border: 2px inset #ffffff;
            font-weight: bold;
        }

        /* Grid principal - 3 columnas */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            flex: 1;
            min-height: 0;
            margin-bottom: 15px;
        }

       /* Columna 1 - CAPÍTULO 3 (MORADO) */
        .col-1 {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chapter-box {
            background: linear-gradient(145deg, #aa44ff, #5a2a8a);
            border: 8px ridge #cc88ff;
            box-shadow: 
                inset -4px -4px 0 #3a1a5a,
                inset 4px 4px 0 #ddbbff,
                10px 10px 0 #000000,
                14px 14px 0 #2a1542;
            padding: 15px;
            flex: 1;
            display: flex;
            align-items: center;
        }

        .chapter-box p {
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffff00;
            background: #2a1542;
            padding: 20px;
            border: 4px inset #b87aff;
            text-align: left;
            text-transform: uppercase;
            line-height: 1.8;
            width: 100%;
            text-shadow: 2px 2px 0 #6a2e8a;
        }

        .chapter-box strong {
            display: block;
            font-size: 1.8rem;
            color: #ffccff;
            text-shadow: 2px 2px 0 #4a1d6a;
            margin-bottom: 10px;
        }
        /* Columna 2 - VISITANTES y EN DESARROLLO */
        .col-2 {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .counter-box {
            background: linear-gradient(145deg, #d47aff, #b347e6);
            border: 8px ridge #ffaa33;
            box-shadow: 
                inset -4px -4px 0 #8822bb,
                inset 4px 4px 0 #ffddff,
                10px 10px 0 #000000,
                14px 14px 0 #330066;
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }

        .counter-label {
            font-family: 'Arial Black', sans-serif;
            font-size: 1rem;
            color: #ffff00;
            text-shadow: 2px 2px 0 #ff33ff;
            margin-bottom: 8px;
        }

        .counter-number {
            font-family: 'Courier New', monospace;
            font-size: 1.8rem;
            color: #00ff00;
            background: #000000;
            padding: 6px 15px;
            border: 4px inset #ffffff;
            letter-spacing: 4px;
            font-weight: bold;
        }

        /* Columna 3 - CONTACTO y MARZO */
        .col-3 {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-box {
            background: linear-gradient(145deg, #cc66ff, #9933cc);
            border: 8px ridge #33ff33;
            box-shadow: 
                inset -4px -4px 0 #7722aa,
                inset 4px 4px 0 #ffccff,
                10px 10px 0 #000000,
                14px 14px 0 #330066;
            padding: 15px;
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
        }

        .info-label {
            font-family: 'Arial Black', sans-serif;
            font-size: 1rem;
            color: #ffff00;
            text-shadow: 2px 2px 0 #ff33ff;
            margin-bottom: 8px;
        }

        .info-value {
            font-family: 'Courier New', monospace;
            font-size: 1.4rem;
            color: #ffffff;
            background: #2a0044;
            padding: 6px 15px;
            border: 4px inset #ff66ff;
        }

        /* Botón de reserva */
        .reserve-button-box {
            background: linear-gradient(145deg, #ff80ff, #cc33cc);
            border: 10px ridge #00ffff;
            box-shadow: 
                inset -5px -5px 0 #aa33aa,
                inset 5px 5px 0 #ffccff,
                12px 12px 0 #000000,
                16px 16px 0 #330033;
            padding: 12px;
            text-align: left;
            margin: 10px 0;
            height: 70px;
            display: flex;
            align-items: center;
        }

        .btn-reserve {
            display: inline-block;
            background: linear-gradient(145deg, #ffb366, #ff8000);
            color: #ffffff;
            font-size: 2rem;
            font-family: 'Arial Black', 'Impact', sans-serif;
            padding: 8px 40px;
            text-decoration: none;
            border: 8px outset #ffff00;
            box-shadow: 
                inset -4px -4px 0 #b35900,
                inset 4px 4px 0 #ffdd99,
                8px 8px 0 #000000,
                12px 12px 0 #332200;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 3px 3px 0 #663300;
        }

        .btn-reserve:active {
            transform: translate(4px, 4px);
            box-shadow: inset -2px -2px 0 #b35900, inset 2px 2px 0 #ffdd99, 4px 4px 0 #000000;
        }

        /* Footer */
        .footer {
            display: flex;
            gap: 15px;
            margin-top: 10px;
            height: 50px;
        }

        .footer-btn {
            flex: 1;
            background: linear-gradient(145deg, #cc66ff, #9933cc);
            border: 5px ridge #ffcc00;
            box-shadow: 
                inset -3px -3px 0 #6622aa,
                inset 3px 3px 0 #ffccff,
                6px 6px 0 #000000,
                8px 8px 0 #330066;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Black', sans-serif;
            font-size: 1rem;
            color: #ffff00;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #ff33ff;
            cursor: pointer;
        }

        .footer-btn:active {
            transform: translate(2px, 2px);
            box-shadow: inset -2px -2px 0 #6622aa, inset 2px 2px 0 #ffccff, 3px 3px 0 #000000;
        }

        /* Modal (ya no se usa, pero lo dejamos por si acaso) */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.96);
            z-index: 10000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal img {
            max-width: 80%;
            max-height: 80%;
            border: 15px solid #ffffff;
            box-shadow: 0 0 0 10px #ff33ff, 0 0 0 20px #00ffff;
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 30px;
            font-size: 3rem;
            color: #ffffff;
            cursor: pointer;
            text-shadow: 3px 3px 0 #ff33ff, 5px 5px 0 #00ffff;
            font-family: 'Courier New', monospace;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="noise-3d"></div>

    <!-- Modal (inactivo) -->
    <div class="modal" id="image-modal">
        <span class="modal-close" id="close-modal">X</span>
        <img id="modal-image" src="" alt="Vista ampliada">
    </div>

    <div class="container">
        <h1 onclick="alert('LEYENDAS · CAPÍTULO 2 · 3 PERSONAS · ¡APÓYANOS!')">LEYENDAS</h1>

        <!-- Fila superior con carrusel de merch clickeable -->
        <div class="top-bar">
            <div class="reserve-text">RESERVA EL CÓMIC</div>
            <div class="close-box">
                <div class="x">CIERRE</div>
                <div class="time" id="countdown">72:00:00</div>
            </div>
            <!-- CARRUSEL DE MERCH (CLICKEABLE) -->
            <div class="merch-carousel">
                <div class="merch-title">⚔️ MERCHANDISING ⚔️</div>
                <div class="merch-track-container">
                    <div class="merch-track" id="merchTrack"></div>
                </div>
            </div>
        </div>

        <!-- Grid principal de 3 columnas -->
        <div class="main-grid">
            <!-- Columna 1 - CAPÍTULO 3 (VERDE) -->
            <div class="col-1">
                <div class="chapter-box">
                    <p>
                        <strong>⚔️ CAPÍTULO 2⚔️</strong>
                        MARZO 2026<br>
                        予約 · RESERVA
                    </p>
                </div>
            </div>

            <!-- Columna 2 - VISITANTES y EN DESARROLLO -->
            <div class="col-2">
                <div class="counter-box">
                    <div class="counter-label">来訪者 · VISITANTES</div>
                    <div class="counter-number" id="visit-counter">000000</div>
                </div>
                <div class="counter-box">
                    <div class="counter-label">ENVELOPE</div>
                    <div class="counter-number" id="envelope">EN DESARROLLO</div>
                </div>
            </div>

            <!-- Columna 3 - CONTACTO y MARZO -->
            <div class="col-3">
                <div class="info-box">
                    <div class="info-label">CONTACTO</div>
                    <div class="info-value" id="contact">@</div>
                </div>
                <div class="info-box">
                    <div class="info-label">MES</div>
                    <div class="info-value" id="month">MARZO 2026</div>
                </div>
            </div>
        </div>

        <!-- Botón de reserva -->
        <div class="reserve-button-box">
            <a href="https://forms.gle/UNEqjT11tXv9JDbf6" class="btn-reserve" target="_blank">
                予約 · RESERVAR
            </a>
        </div>

        <!-- Footer -->
        <div class="footer">
            <div class="footer-btn" onclick="alert('死 · SOBRE · Creado por 3 personas')">死 · SOBRE</div>
            <div class="footer-btn" onclick="alert('減 · COMIC · Capítulo 2 · Marzo 2026')">減 · COMIC </div>
            <div class="footer-btn" onclick="alert('観 · FAQ · Sin preguntas, solo reserva')">観 · FAQ</div>
            <div class="footer-btn" onclick="alert('視 · CONTACTO · riscozamoralucas@gmail.com')">視 · CONTACTO</div>
        </div>
    </div>

    <script>
        // Modal (ya no se usa)
        const modal = document.getElementById('image-modal');
        const modalImg = document.getElementById('modal-image');
        const closeModal = document.getElementById('close-modal');

        window.openModal = function(src) {
            modal.classList.add('active');
            modalImg.src = src;
        };

        closeModal.onclick = () => modal.classList.remove('active');
        modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };

        // Valores estáticos actualizados
        document.getElementById('countdown').textContent = '72:00:00';
        document.getElementById('envelope').textContent = 'EN DESARROLLO';
        document.getElementById('contact').textContent = '@riscozamoralucas';
        document.getElementById('month').textContent = 'MARZO 2026';

        // CONTADOR DE VISITANTES EN TIEMPO REAL
        let visits = localStorage.getItem('visitCount') ? parseInt(localStorage.getItem('visitCount')) : 0;
        visits++;
        localStorage.setItem('visitCount', visits);
        document.getElementById('visit-counter').textContent = visits.toString().padStart(6, '0');

        // CARRUSEL DE MERCH - CON ENLACES A LA TIENDA
        const merchData = [
            { name: "SEBAS HOODIE", price: "$38.00", img: "https://assets.bigcartel.com/product_images/382850263/SEBAS_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/sebas-unisex-hoodie" },
            { name: "CUADERNO", price: "$19.99", img: "https://assets.bigcartel.com/product_images/382850273/CUADERNO_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/cuaderno-de-leyendas" },
            { name: "OTHER DIMENSION", price: "$38.00", img: "https://assets.bigcartel.com/product_images/382850283/OTHER_DIMENSION_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/the-other-dimension-heavy-tee" },
            { name: "THE OTHER TEE", price: "$22.99", img: "https://assets.bigcartel.com/product_images/382850293/OTHER_DIMENSION_TEE_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/the-other-dimension-tee" },
            { name: "ANDRES TEE", price: "$22.00", img: "https://assets.bigcartel.com/product_images/382850303/ANDRES_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/andres-tee" },
            { name: "STIKER SEBAS", price: "$6.99", img: "https://assets.bigcartel.com/product_images/382850313/STIKER_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/stiker-sebas" },
            { name: "SEBAS MUG", price: "$15.99", img: "https://assets.bigcartel.com/product_images/382850323/MUG_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/sebas-mug" },
            { name: "IKER NECKLACE", price: "$23.99", img: "https://assets.bigcartel.com/product_images/382850333/NECKLACE_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/iker-necklace" },
            { name: "IKER TEE", price: "$24.00", img: "https://assets.bigcartel.com/product_images/382850343/IKER_TEE_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/iker-tee" },
            { name: "FALLING TEE", price: "$17.00", img: "https://assets.bigcartel.com/product_images/382850353/FALLING_TEE_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/falling-tee" },
            { name: "FALLING MUG", price: "$11.99", img: "https://assets.bigcartel.com/product_images/382850363/FALLING_MUG_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/falling-mug" },
            { name: "LA 3 NECKLACE", price: "$23.99", img: "https://assets.bigcartel.com/product_images/382850373/LA3_NECKLACE_MOCKUP.png?auto=format&fit=max&w=400", link: "https://my-store-102d461.creator-spring.com/listing/la-3-necklace" }
        ];

        const merchTrack = document.getElementById('merchTrack');
        // Duplicamos para efecto infinito
        const allMerchItems = [...merchData, ...merchData];
        
        allMerchItems.forEach(item => {
            const itemLink = document.createElement('a');
            itemLink.href = item.link;
            itemLink.target = "_blank";
            itemLink.className = "merch-item";
            itemLink.innerHTML = `
                <img src="${item.img}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/80x80/ff33ff/ffffff?text=MERCH'">
                <div class="name">${item.name}</div>
                <div class="price">${item.price}</div>
            `;
            merchTrack.appendChild(itemLink);
        });

        // Ajustar la animación según el ancho real
        setTimeout(() => {
            const trackWidth = merchTrack.scrollWidth / 2;
            if (trackWidth > 0) {
                const style = document.createElement('style');
                style.innerHTML = `
                    @keyframes scrollMerch {
                        0% { transform: translateX(0); }
                        100% { transform: translateX(-${trackWidth}px); }
                    }
                `;
                document.head.appendChild(style);
            }
        }, 200);
    </script>
</body>
</html>
